# Default semantic masking profile for local-data-masker.
#
# Keep this file free of real customer or personal data. It should contain only
# generic examples and safe fictional replacement pools.

custom_replacements:
  Money Laundering: Healthy Nutrition
  Anti-Corruption and Money Laundering Prevention: Workplace Health and Healthy Nutrition
  Anti-Corruption: Workplace Safety
  Internal Audit: Learning Review
  Confidential Supplier Review: Learning Provider Review

column_categories:
